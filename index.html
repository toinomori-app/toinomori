<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>問ノ森 住人案内</title>
<style>
:root{--bg:#f6f1e6;--paper:#fffaf0;--paper2:#fffdf8;--line:#d9c8a8;--green:#5b7d47;--green2:#6f8e5d;--text:#4a3a2a;--sub:#7d6a55}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:560px;margin:auto;padding:28px 18px 48px}
.card{background:var(--paper);border:2px solid var(--line);border-radius:28px;padding:24px 18px;text-align:center;box-shadow:0 10px 24px #0001}
h1{font-size:28px;line-height:1.35;margin:0 0 12px}
p{line-height:1.8}
.section{margin:18px 0;padding:16px;background:var(--paper2);border:1px solid #e3d5bc;border-radius:20px;text-align:left}
.section-title{font-weight:800;margin-bottom:10px;color:var(--green)}
.row{display:flex;gap:10px}
select,input{width:100%;padding:13px;margin:6px 0;border:1px solid #c8b894;border-radius:16px;font-size:16px;background:var(--paper2)}
label{display:block;margin:8px 0;font-size:16px}
.check{display:flex;align-items:center;gap:8px;margin-top:8px}
.check input{width:auto}
.radio-row{display:flex;gap:18px;margin-top:8px}
.note-small{font-size:12px;line-height:1.7;color:var(--sub);margin-top:8px}
button{width:100%;padding:14px;border:0;border-radius:999px;background:var(--green2);color:white;font-size:18px;font-weight:800;margin-top:12px}
.result{display:none;margin-top:20px;padding:22px;background:#eef7e8;border-radius:22px;text-align:center}
.result-title{font-size:20px;font-weight:800;line-height:1.8;color:#4f7042}
.no{font-size:44px;font-weight:900;color:var(--green);line-height:1.3;margin-top:8px}
.name{font-size:24px;font-weight:900;margin-top:8px;line-height:1.5}
.message{margin-top:8px;line-height:1.9;font-size:18px}
.card-img{width:100%;max-width:420px;border-radius:22px;margin-top:18px;box-shadow:0 8px 18px #0002}
.qr-area{display:none;margin-top:24px;padding:18px;background:var(--paper2);border-radius:20px;border:1px solid var(--line)}
.qr-title{font-weight:800;color:var(--green);line-height:1.8}
.qr-text{font-size:13px;line-height:1.7;color:var(--sub);margin:8px 0 12px}
.qr-img{width:180px;height:180px;border-radius:12px;background:white;padding:8px}
.home-url{word-break:break-all;font-size:11px;color:var(--sub);margin-top:10px}
.note{font-size:13px;text-align:left;color:var(--sub);border-top:1px dashed #c8b894;margin-top:18px;padding-top:12px}
.version{margin-top:18px;font-size:11px;color:#9b8a72;text-align:center}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h1 id="mainTitle">🌳問ノ森<br>あなたの住人を探そう</h1>
<p id="leadText">生年月日から<br>あなたの住人を探します。</p>

<div id="inputArea">
<div class="section">
<div class="section-title">🎂 生年月日</div>
<div class="row">
<select id="year"></select>
<select id="month"></select>
<select id="day"></select>
</div>
</div>

<div class="section">
<div class="section-title">🕰 出生時間（任意）</div>
<div class="row">
<select id="hour"></select>
<select id="minute"></select>
</div>
<label class="check"><input type="checkbox" id="unknownTime"> 出生時間がわからない</label>
<div class="note-small">※出生時間は今後の機能で<br>使用することがあります。</div>
</div>

<div class="section">
<div class="section-title">👤 性別（任意）</div>
<div class="radio-row">
<label><input type="radio" name="gender" value="female"> 女性</label>
<label><input type="radio" name="gender" value="male"> 男性</label>
</div>
<div class="note-small">※性別は今後の機能で<br>使用することがあります。</div>
</div>

<div class="section">
<div class="section-title">📝 お名前（任意）</div>
<div class="note-small">ひらがな</div>
<input id="lastName" placeholder="姓">
<input id="firstName" placeholder="名">
<div class="note-small">※あなたの物語を<br>より深く歩くときに<br>使用することがあります。</div>
</div>

<button onclick="searchResident()">🌳 森へ入る</button>
</div>

<div id="result" class="result">
<div id="resultTitle" class="result-title"></div>
<div id="no" class="no"></div>
<div id="name" class="name"></div>
<div id="message" class="message"></div>

<img id="cardImage" class="card-img" alt="住人カード">

<div id="meguriArea" class="section"></div>

<div id="qrArea" class="qr-area">
<div class="qr-title">🏠住人のお家はこちら</div>
<div class="qr-text">このQRコードを読み取ると<br>いつでもこの住人のお家へ<br>遊びに来られます🌳</div>
<img id="qrImage" class="qr-img" alt="QRコード">
<div id="homeUrl" class="home-url"></div>
</div>
</div>

<div id="noteArea" class="note">
※これは生年月日だけで出す簡易版です。<br>
本格的な読み解きでは、生まれた時刻や全体の流れもあわせて見ていきます。
</div>

<div class="version">問ノ森 β Ver1.1</div>
</div>
</div>

<script src="meguri.js"></script>
<script src="meishiki.js"></script>

<script>
const residents = [
["01","甲子","お母さんねずみ"],["02","乙丑","花守りの牛"],["03","丙寅","カリスマ監督の寅"],["04","丁卯","菩薩うさぎ"],["05","戊辰","山の龍"],["06","己巳","研究者の蛇"],["07","庚午","開拓の馬車"],["08","辛未","伝統工芸の羊"],["09","壬申","離島を泳ぐ猿"],["10","癸酉","雨告げの鳥"],
["11","甲戌","森の村役人の犬"],["12","乙亥","農家の猪"],["13","丙子","人気者のねずみ"],["14","丁丑","廃材アート作家の牛"],["15","戊寅","戦略アナリストの寅"],["16","己卯","カフェ店長のうさぎ"],["17","庚辰","開拓の龍"],["18","辛巳","スタイリストの蛇"],["19","壬午","モンゴルの馬"],["20","癸未","相棒のぬいぐるみ羊"],
["21","甲申","樹木医の猿"],["22","乙酉","自然界の鳥"],["23","丙戌","保育士の犬"],["24","丁亥","森のカウンセラーの猪"],["25","戊子","俵のねずみ"],["26","己丑","縁の下の働き牛"],["27","庚寅","開拓者の寅"],["28","辛卯","宝石店主のうさぎ"],["29","壬辰","時代をつくる龍"],["30","癸巳","個性派劇団員の蛇"],
["31","甲午","牧場の馬"],["32","乙未","牧場主の羊"],["33","丙申","サーカスの猿"],["34","丁酉","ランタン職人の鳥"],["35","戊戌","山守の犬"],["36","己亥","信念の耕作人の猪"],["37","庚子","起業家のねずみ"],["38","辛丑","宝石研磨職人の牛"],["39","壬寅","企画・広報の寅"],["40","癸卯","豊作祈祷師のうさぎ"],
["41","甲辰","天空の昇り龍"],["42","乙巳","ハーブ園の蛇"],["43","丙午","発信者の馬"],["44","丁未","絵本作家の羊"],["45","戊申","山の隊長の猿"],["46","己酉","実りを運ぶ鳥"],["47","庚戌","鍛治番の犬"],["48","辛亥","研鑽クリエイターの猪"],["49","壬子","ジャーナリストのねずみ"],["50","癸丑","ブーケ職人の牛"],
["51","甲寅","チアリーダーの寅"],["52","乙卯","メルヘン丘のうさぎ"],["53","丙辰","神の使い朱龍"],["54","丁巳","心の語り部の蛇"],["55","戊午","登山バスの馬"],["56","己未","老舗農園の羊"],["57","庚申","剣舞の猿"],["58","辛酉","ネイリストの鳥"],["59","壬戌","海上保安官の犬"],["60","癸亥","森の救命士の猪"]
];

function fillSelect(id,start,end,suffix){
const s=document.getElementById(id);
s.innerHTML="";
for(let i=start;i<=end;i++){
const o=document.createElement("option");
o.value=i;
o.textContent=i+suffix;
s.appendChild(o);
}
}

function updateDays(){
const y=Number(document.getElementById("year").value);
const m=Number(document.getElementById("month").value);
const dSelect=document.getElementById("day");
const current=Number(dSelect.value)||1;
const max=new Date(y,m,0).getDate();
dSelect.innerHTML="";
for(let d=1;d<=max;d++){
const o=document.createElement("option");
o.value=d;
o.textContent=d+"日";
dSelect.appendChild(o);
}
dSelect.value=Math.min(current,max);
}

function setup(){
const now=new Date().getFullYear();
fillSelect("year",1900,now,"年");
fillSelect("month",1,12,"月");
fillSelect("hour",0,23,"時");
fillSelect("minute",0,59,"分");
document.getElementById("year").value=1977;
document.getElementById("month").value=2;
updateDays();
document.getElementById("day").value=19;
document.getElementById("hour").value=0;
document.getElementById("minute").value=0;
document.getElementById("year").addEventListener("change",updateDays);
document.getElementById("month").addEventListener("change",updateDays);
}

function julianDayNumber(y,m,d){
const a=Math.floor((14-m)/12);
const yy=y+4800-a;
const mm=m+12*a-3;
return d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;
}

function index60(y,m,d){
const jdn=julianDayNumber(y,m,d);
return ((jdn+49)%60+60)%60;
}

function getDisplayName(){
const last=document.getElementById("lastName").value.trim();
const first=document.getElementById("firstName").value.trim();
if(first) return first;
if(last) return last;
return "";
}

function findResidentByNo(cardNo){
return residents.find(item => item[0] === String(cardNo).padStart(2,"0"));
}

function buildCardUrl(cardNo){
return location.origin + location.pathname + "?card=" + cardNo;
}

function renderResident(r, options={}){
const displayName=options.displayName || "";
const cardOnly=options.cardOnly || false;
const cardUrl=buildCardUrl(r[0]);

document.getElementById("resultTitle").textContent =
displayName ? "🌳" + displayName + "さんの森には…" : "🌳あなたの森には…";

document.getElementById("no").textContent = r[0] + "番";
document.getElementById("name").textContent = r[2];
document.getElementById("message").innerHTML =
"が住んでいるようです🏠<br><br>少し覗いてみましょう🌳✨";

const meguriKana = residentMeguriMap[r[0]];
const testMeguri = meguriKana ? meguriMap[meguriKana] : null;
if(testMeguri){
  document.getElementById("meguriArea").innerHTML =
  "🪽あなたの巡り屋は<br><br>【" + meguriKana + "】<br>" +
  testMeguri.title + "<br>" +
  testMeguri.subtitle;
}else{
  document.getElementById("meguriArea").innerHTML = "";
}

const img=document.getElementById("cardImage");
img.src="./images/"+r[0]+".png";
img.alt=r[0]+" "+r[2];

if(cardOnly){
document.getElementById("qrArea").style.display="none";
}else{
document.getElementById("qrArea").style.display="block";
document.getElementById("qrImage").src =
"https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" + encodeURIComponent(cardUrl);
document.getElementById("homeUrl").textContent = cardUrl;
}

document.getElementById("result").style.display="block";
}

function searchResident(){
const y=Number(document.getElementById("year").value);
const m=Number(document.getElementById("month").value);
const d=Number(document.getElementById("day").value);

if(!y||!m||!d){
alert("生年月日を入れてね🌱");
return;
}

const r=residents[index60(y,m,d)];
renderResident(r,{displayName:getDisplayName(),cardOnly:false});
document.getElementById("result").scrollIntoView({behavior:"smooth",block:"start"});
}

function showCardOnly(cardNo){
const r=findResidentByNo(cardNo);
document.getElementById("mainTitle").innerHTML="🌳問ノ森<br>住人のお家";
document.getElementById("leadText").innerHTML="森の中を<br>少し覗いてみましょう。";
document.getElementById("inputArea").classList.add("hidden");
document.getElementById("noteArea").classList.add("hidden");

if(!r){
document.getElementById("leadText").innerHTML="住人のお家が<br>見つかりませんでした。";
return;
}

renderResident(r,{displayName:"",cardOnly:true});
}

function init(){
setup();
const params=new URLSearchParams(location.search);
const cardParam=params.get("card");
if(cardParam){
showCardOnly(cardParam);
}
}

init();
</script>

</body>
</html>
